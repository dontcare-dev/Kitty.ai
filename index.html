<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Kitty AI — Powered by Claude</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0b;color:#f0f0f2;font-family:'Segoe UI',sans-serif;height:100vh;display:flex}
.chat{flex:1;display:flex;flex-direction:column;max-width:1000px;margin:0 auto;width:100%}
.header{padding:20px;border-bottom:1px solid rgba(255,255,255,0.1)}
.header h1{color:#e8192c}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:12px;max-width:80%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.avatar{width:36px;height:36px;border-radius:50%;background:#1a1a1e;display:flex;align-items:center;justify-content:center}
.msg.user .avatar{background:#e8192c}
.bubble{padding:12px 16px;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1)}
.msg.user .bubble{background:rgba(232,25,44,0.15);border-color:rgba(232,25,44,0.3)}
.time{font-size:10px;color:#606068;margin-top:6px}
.input-area{padding:20px;border-top:1px solid rgba(255,255,255,0.1)}
.model-selector{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.model-btn{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#a0a0aa}
.model-btn.active{background:rgba(232,25,44,0.15);border-color:rgba(232,25,44,0.4);color:#e8192c}
.input-wrap{display:flex;gap:12px}
textarea{flex:1;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:white;font-family:inherit;resize:none}
button{padding:12px 24px;border-radius:12px;border:none;background:#e8192c;color:white;font-weight:600;cursor:pointer}
.typing-dots{display:flex;gap:4px;padding:12px}
.typing-dot{width:8px;height:8px;border-radius:50%;background:#606068;animation:bounce 1.4s infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-10px)}}
@media(max-width:768px){.msg{max-width:90%}.avatar{width:30px;height:30px}}
</style>
</head>
<body>
<div class="chat">
  <div class="header"><h1>🐱 Kitty AI (Claude)</h1></div>
  <div class="messages" id="messages"><div style="text-align:center;padding:40px;color:#606068">🐱 Ask me anything – powered by Claude</div></div>
  <div class="input-area">
    <div class="model-selector" id="modelSelector"></div>
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="Type your message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button id="sendBtn" onclick="send()">Send</button>
    </div>
  </div>
</div>
<script>
const MODELS = [
  { id: 'llama-3.3-70b-versatile', name: 'Claude 3.5 Sonnet', limit: 50 },
  { id: 'llama3-70b-8192', name: 'Claude 3.5 Haiku', limit: 100 },
  { id: 'mixtral-8x7b-32768', name: 'Claude 3 Opus', limit: 30 }
];
let currentModel = MODELS[0];
let messages = [];
let typing = false;
let user = null;

const savedUser = localStorage.getItem('kitty_user');
if (savedUser) user = JSON.parse(savedUser);
else {
  user = { username: 'guest', usage: { 'Claude 3.5 Haiku': 0, 'Claude 3.5 Sonnet': 0, 'Claude 3 Opus': 0 }, usageDate: new Date().toDateString() };
  localStorage.setItem('kitty_user', JSON.stringify(user));
}

function resetDailyIfNeeded() {
  const today = new Date().toDateString();
  if (user.usageDate !== today) {
    user.usage = { 'Claude 3.5 Haiku': 0, 'Claude 3.5 Sonnet': 0, 'Claude 3 Opus': 0 };
    user.usageDate = today;
    localStorage.setItem('kitty_user', JSON.stringify(user));
  }
}

function render() {
  const container = document.getElementById('messages');
  if (!messages.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:#606068">🐱 Ask me anything – powered by Claude</div>';
    return;
  }
  container.innerHTML = messages.map(m => `
    <div class="msg ${m.role}">
      <div class="avatar">${m.role === 'user' ? '👤' : '🐱'}</div>
      <div><div class="bubble">${escapeHtml(m.content)}</div><div class="time">${new Date(m.timestamp).toLocaleTimeString()}</div></div>
    </div>
  `).join('');
  container.scrollTop = container.scrollHeight;
}
function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;';}); }
function updateModels() {
  document.getElementById('modelSelector').innerHTML = MODELS.map(m => `<button class="model-btn ${currentModel.name === m.name ? 'active' : ''}" onclick="setModel('${m.name}')">${m.name} (${m.limit}/day)</button>`).join('');
}
function setModel(name) { currentModel = MODELS.find(m => m.name === name); updateModels(); }
async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || typing) return;
  resetDailyIfNeeded();
  const used = user.usage[currentModel.name] || 0;
  if (used >= currentModel.limit) {
    alert(`Daily limit reached for ${currentModel.name} (${currentModel.limit}/day). Try another model.`);
    return;
  }
  input.value = '';
  messages.push({ role: 'user', content: text, timestamp: new Date().toISOString() });
  render();
  typing = true;
  document.getElementById('sendBtn').disabled = true;
  const typingDiv = document.createElement('div'); typingDiv.className = 'msg assistant'; typingDiv.innerHTML = `<div class="avatar">🐱</div><div><div class="bubble"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`;
  document.getElementById('messages').appendChild(typingDiv);
  document.querySelector('.messages').scrollTop = document.querySelector('.messages').scrollHeight;
  try {
    const history = messages.slice(-10).map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content }));
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: currentModel.id, messages: history })
    });
    const data = await response.json();
    const aiText = data.choices?.[0]?.message?.content || '⚠ No response';
    typingDiv.remove();
    messages.push({ role: 'assistant', content: aiText, timestamp: new Date().toISOString() });
    user.usage[currentModel.name] = used + 1;
    localStorage.setItem('kitty_user', JSON.stringify(user));
    render();
  } catch(e) {
    typingDiv.remove();
    messages.push({ role: 'assistant', content: `⚠ Error: ${e.message}`, timestamp: new Date().toISOString() });
    render();
  }
  typing = false;
  document.getElementById('sendBtn').disabled = false;
}
updateModels();
render();
</script>
</body>
</html>
