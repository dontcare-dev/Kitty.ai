<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Kitty.Ai — Smarter AI, less chatter</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #050505;
  --surface: #0c0c0e;
  --surface2: #131316;
  --surface3: #1c1c22;
  --border: rgba(255, 255, 255, 0.06);
  --border2: rgba(255, 255, 255, 0.12);
  --text: #f1f1f5;
  --text2: #a1a1ab;
  --text3: #6b6b76;
  --accent: #e8192c;
  --accent-dim: #9b0f1c;
  --accent-glow: rgba(232, 25, 44, 0.2);
  --radius: 20px;
  --radius-sm: 12px;
}

body {
  background: var(--bg);
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  font-weight: 400;
  line-height: 1.5;
}

/* main layout */
.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 1400px;
  margin: 0 auto;
  background: radial-gradient(ellipse at 20% 30%, rgba(232,25,44,0.05), transparent 60%);
}

/* header */
.header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(5,5,5,0.8);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

.logo {
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #fff 0%, #e8192c 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.logo span {
  color: var(--accent);
  background: none;
  -webkit-background-clip: unset;
}

.model-badge {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 4px 12px;
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text2);
}

/* chat area */
.chat-container {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* sidebar (conversations) – hidden on mobile by default */
.sidebar {
  width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: transform 0.2s ease;
  z-index: 20;
}

@media (max-width: 700px) {
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    transform: translateX(-100%);
    width: 280px;
    box-shadow: 4px 0 20px rgba(0,0,0,0.5);
    z-index: 30;
  }
  .sidebar.mobile-open {
    transform: translateX(0);
  }
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 8px;
}

.new-chat-btn {
  background: var(--accent);
  border: none;
  color: white;
  font-weight: 600;
  padding: 10px;
  border-radius: 12px;
  width: 100%;
  font-size: 0.85rem;
  cursor: pointer;
  transition: 0.15s;
}
.new-chat-btn:hover {
  background: #ff2f42;
}

.chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.chat-item {
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
  background: var(--surface2);
  border: 1px solid transparent;
  transition: all 0.1s;
}
.chat-item.active {
  background: var(--surface3);
  border-color: var(--accent);
}
.chat-item .title {
  font-size: 0.8rem;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-item .preview {
  font-size: 0.7rem;
  color: var(--text3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-item-actions {
  display: flex;
  gap: 6px;
  justify-content: flex-end;
  margin-top: 6px;
}
.chat-item-actions button {
  background: transparent;
  border: none;
  color: var(--text3);
  font-size: 0.7rem;
  cursor: pointer;
}

/* main chat */
.main-chat {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.message {
  display: flex;
  gap: 12px;
  max-width: 85%;
  animation: fadeIn 0.2s ease;
}
.message.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}
.avatar {
  width: 34px;
  height: 34px;
  background: var(--surface3);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}
.message.user .avatar {
  background: var(--accent);
}
.bubble {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 10px 16px;
  font-size: 0.85rem;
  line-height: 1.5;
  word-break: break-word;
}
.message.user .bubble {
  background: rgba(232,25,44,0.12);
  border-color: rgba(232,25,44,0.3);
}
.time {
  font-size: 0.6rem;
  color: var(--text3);
  margin-top: 4px;
  text-align: right;
}
pre {
  background: #0a0a0c;
  padding: 12px;
  border-radius: 12px;
  overflow-x: auto;
  margin: 8px 0;
  font-size: 0.75rem;
  font-family: monospace;
}
code {
  font-family: monospace;
  font-size: 0.75rem;
}

/* input area */
.input-area {
  padding: 16px;
  border-top: 1px solid var(--border);
  background: rgba(8,8,10,0.9);
  backdrop-filter: blur(8px);
}

.model-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.model-pill {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 6px 14px;
  font-size: 0.7rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.1s;
  color: var(--text2);
}
.model-pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.model-pill.disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.input-wrapper {
  display: flex;
  gap: 12px;
  align-items: flex-end;
}
textarea {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 12px 18px;
  font-size: 0.9rem;
  color: var(--text);
  resize: none;
  font-family: inherit;
  outline: none;
  max-height: 120px;
}
.send-btn {
  background: var(--accent);
  border: none;
  width: 44px;
  height: 44px;
  border-radius: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.1s;
  color: white;
  font-size: 1.2rem;
}
.send-btn:disabled {
  opacity: 0.5;
}
.usage {
  font-size: 0.65rem;
  color: var(--text3);
  margin-top: 8px;
  text-align: right;
  display: flex;
  justify-content: space-between;
}
.limit-warning {
  background: rgba(232,25,44,0.1);
  border: 1px solid rgba(232,25,44,0.3);
  border-radius: 12px;
  padding: 8px 12px;
  font-size: 0.7rem;
  color: #ff6b7a;
  margin-bottom: 10px;
  display: none;
}
.typing {
  display: flex;
  gap: 4px;
  padding: 8px 0;
}
.typing span {
  width: 6px;
  height: 6px;
  background: var(--text3);
  border-radius: 50%;
  animation: pulse 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,100%{ opacity:0.3 } 50%{ opacity:1 } }

.mobile-menu-btn {
  display: none;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px;
  cursor: pointer;
}
@media (max-width: 700px) {
  .mobile-menu-btn { display: block; }
  .message { max-width: 95%; }
  .bubble { font-size: 0.8rem; }
}

.empty-state {
  text-align: center;
  padding: 40px;
  color: var(--text3);
}
.empty-state-icon {
  font-size: 48px;
  margin-bottom: 16px;
}
.suggestions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 16px;
}
.suggestion {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 6px 14px;
  font-size: 0.7rem;
  cursor: pointer;
}
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 25;
}
.overlay.show { display: block; }
@media (max-width: 700px) {
  .overlay.show { display: block; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div style="display: flex; align-items: center; gap: 12px;">
      <button class="mobile-menu-btn" id="menuBtn">☰</button>
      <div class="logo">Kitty<span>.Ai</span></div>
    </div>
    <div class="model-badge" id="currentModelLabel">⚡ Lite</div>
  </div>

  <div class="chat-container">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
      </div>
      <div class="chat-list" id="chatList"></div>
    </div>
    <div class="overlay" id="mobileOverlay"></div>
    <div class="main-chat">
      <div class="messages" id="messages">
        <div class="empty-state">
          <div class="empty-state-icon">🐱</div>
          <div style="font-size: 1rem; font-weight: 500;">Kitty.Ai</div>
          <div style="font-size: 0.75rem;">Ask me anything – code, debug, explain.</div>
          <div class="suggestions">
            <div class="suggestion" data-suggestion="Write a Python function to reverse a linked list">Reverse linked list</div>
            <div class="suggestion" data-suggestion="Explain async/await in JS with example">Async/await JS</div>
            <div class="suggestion" data-suggestion="Build a simple React component for a counter">React counter</div>
          </div>
        </div>
      </div>
      <div class="input-area">
        <div class="limit-warning" id="limitWarning">⚠️ Daily limit reached for this model</div>
        <div class="model-row" id="modelSelector"></div>
        <div class="input-wrapper">
          <textarea id="userInput" rows="1" placeholder="Type your message... (shift+enter for new line)"></textarea>
          <button class="send-btn" id="sendBtn">➤</button>
        </div>
        <div class="usage" id="usageInfo"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ================= KITTY.AI - CLEAN, MOBILE, WORKING MODELS =================
const MODELS = [
  { id: 'lite', label: 'Kitty Lite', api: 'llama-3.3-70b-versatile', limit: 100, color: '#22c55e' },
  { id: 'sonnet', label: 'Kitty Pro', api: 'llama-3.3-70b-versatile', limit: 50, color: '#3b82f6' },
  { id: 'opus', label: 'Kitty Max', api: 'mixtral-8x7b-32768', limit: 30, color: '#a855f7' }
];

let currentModel = MODELS[0];
let user = null;
let chats = {};
let activeChatId = null;
let isTyping = false;

// Storage helpers
const storage = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
  del: k => localStorage.removeItem(k)
};

// User & auth (simple)
async function hash(pwd) {
  const enc = new TextEncoder().encode('kitty_salt:' + pwd);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function initAdmin() {
  const users = storage.get('kitty_users') || {};
  if (!users.admin) {
    const hashed = await hash('admin123');
    users.admin = {
      username: 'admin', name: 'Admin', email: 'admin@kitty.ai',
      password: hashed, role: 'admin', banned: false,
      usage: { lite: 0, sonnet: 0, opus: 0 },
      usageDate: new Date().toDateString()
    };
    storage.set('kitty_users', users);
  }
}
// Load session
window.addEventListener('load', async () => {
  await initAdmin();
  const sess = storage.get('kitty_session');
  const users = storage.get('kitty_users') || {};
  if (sess && users[sess]) {
    user = users[sess];
    loadUserChats();
    renderChatList();
    newChat(); // start fresh chat
  } else {
    // auto-login as guest? create a quick guest
    const guestName = 'guest_' + Math.floor(Math.random()*10000);
    const guest = {
      username: guestName, name: 'Guest', email: guestName+'@temp.com',
      password: await hash('guest'), role: 'user', banned: false,
      usage: { lite: 0, sonnet: 0, opus: 0 },
      usageDate: new Date().toDateString()
    };
    users[guestName] = guest;
    storage.set('kitty_users', users);
    storage.set('kitty_session', guestName);
    user = guest;
    loadUserChats();
    newChat();
  }
  renderModelSelector();
  updateUsageDisplay();
  document.getElementById('userInput').focus();
  attachEventListeners();
});

function attachEventListeners() {
  document.getElementById('sendBtn').onclick = sendMessage;
  document.getElementById('newChatBtn').onclick = () => newChat();
  document.getElementById('menuBtn').onclick = () => {
    document.getElementById('sidebar').classList.add('mobile-open');
    document.getElementById('mobileOverlay').classList.add('show');
  };
  document.getElementById('mobileOverlay').onclick = () => {
    document.getElementById('sidebar').classList.remove('mobile-open');
    document.getElementById('mobileOverlay').classList.remove('show');
  };
  document.getElementById('userInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  document.querySelectorAll('.suggestion').forEach(el => {
    el.onclick = () => {
      document.getElementById('userInput').value = el.dataset.suggestion;
      sendMessage();
    };
  });
}

function loadUserChats() {
  const saved = storage.get('kitty_chats_' + user.username) || {};
  chats = saved;
}
function saveChats() {
  storage.set('kitty_chats_' + user.username, chats);
}
function newChat() {
  const id = 'c_' + Date.now();
  chats[id] = {
    id, title: 'New Chat', messages: [], modelId: currentModel.id,
    createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
  };
  activeChatId = id;
  saveChats();
  renderChatList();
  renderActiveChat();
  document.getElementById('userInput').value = '';
  updateUsageDisplay();
}
function selectChat(id) {
  activeChatId = id;
  renderChatList();
  renderActiveChat();
  updateUsageDisplay();
}
function deleteChat(id) {
  if (confirm('Delete this chat?')) {
    delete chats[id];
    if (activeChatId === id) activeChatId = Object.keys(chats)[0] || null;
    saveChats();
    renderChatList();
    renderActiveChat();
  }
}
function renameChat(id) {
  const newName = prompt('Rename chat', chats[id].title);
  if (newName && newName.trim()) chats[id].title = newName.trim().slice(0,40);
  saveChats();
  renderChatList();
  if (activeChatId === id) renderActiveChat();
}
function renderChatList() {
  const container = document.getElementById('chatList');
  const sorted = Object.values(chats).sort((a,b)=> new Date(b.updatedAt) - new Date(a.updatedAt));
  container.innerHTML = sorted.map(c => `
    <div class="chat-item ${c.id === activeChatId ? 'active' : ''}" onclick="selectChat('${c.id}')">
      <div class="title">${escapeHtml(c.title)}</div>
      <div class="preview">${c.messages.length ? (c.messages[c.messages.length-1]?.content?.substring(0,40)||'') : 'Empty'}</div>
      <div class="chat-item-actions">
        <button onclick="event.stopPropagation(); renameChat('${c.id}')">✏️</button>
        <button onclick="event.stopPropagation(); deleteChat('${c.id}')">🗑️</button>
      </div>
    </div>
  `).join('');
}
function renderActiveChat() {
  const container = document.getElementById('messages');
  if (!activeChatId || !chats[activeChatId]) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🐱</div><div>Select or start a chat</div></div>`;
    return;
  }
  const chat = chats[activeChatId];
  if (!chat.messages.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🐱</div><div>Ask Kitty anything – code, explanations, logic.</div><div class="suggestions"><div class="suggestion" data-suggestion="Write a Python function to reverse a linked list">Reverse linked list</div><div class="suggestion" data-suggestion="Explain async/await in JS with example">Async/await JS</div><div class="suggestion" data-suggestion="Build a simple React component for a counter">React counter</div></div></div>`;
    document.querySelectorAll('.suggestion').forEach(el => {
      el.onclick = () => { document.getElementById('userInput').value = el.dataset.suggestion; sendMessage(); };
    });
    return;
  }
  container.innerHTML = chat.messages.map((msg, idx) => `
    <div class="message ${msg.role}">
      <div class="avatar">${msg.role === 'user' ? '👤' : '🐱'}</div>
      <div><div class="bubble">${formatMessage(msg.content)}</div><div class="time">${new Date(msg.timestamp).toLocaleTimeString()}</div></div>
    </div>
  `).join('');
  container.scrollTop = container.scrollHeight;
}

function formatMessage(text) {
  if (!text) return '';
  // simple markdown: code blocks
  let t = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\n/g, '<br>');
  return t;
}
function escapeHtml(str) {
  return String(str).replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function renderModelSelector() {
  const container = document.getElementById('modelSelector');
  const currentTier = chats[activeChatId]?.modelId || currentModel.id;
  container.innerHTML = MODELS.map(m => {
    const used = user?.usage?.[m.id] || 0;
    const exhausted = used >= m.limit;
    return `<button class="model-pill ${currentTier === m.id ? 'active' : ''} ${exhausted ? 'disabled' : ''}" data-model="${m.id}" style="${exhausted ? 'opacity:0.4' : ''}">${m.label} (${used}/${m.limit})</button>`;
  }).join('');
  document.querySelectorAll('.model-pill').forEach(btn => {
    btn.onclick = () => {
      const modelId = btn.dataset.model;
      const model = MODELS.find(m => m.id === modelId);
      if (user.usage[modelId] >= model.limit) {
        alert(`Daily limit reached for ${model.label}`);
        return;
      }
      if (activeChatId && chats[activeChatId]) {
        chats[activeChatId].modelId = modelId;
        saveChats();
      }
      currentModel = model;
      renderModelSelector();
      updateUsageDisplay();
    };
  });
}
function updateUsageDisplay() {
  const tierId = (activeChatId && chats[activeChatId]) ? chats[activeChatId].modelId : currentModel.id;
  const model = MODELS.find(m => m.id === tierId);
  const used = user.usage[tierId] || 0;
  const left = model.limit - used;
  document.getElementById('usageInfo').innerHTML = `${model.label} · ${left} left today`;
  document.getElementById('currentModelLabel').innerHTML = model.label === 'Kitty Lite' ? '⚡ Lite' : (model.label === 'Kitty Pro' ? '🔥 Pro' : '💎 Max');
  const warning = document.getElementById('limitWarning');
  if (left <= 0) warning.style.display = 'flex';
  else warning.style.display = 'none';
}

function resetDailyIfNeeded() {
  const today = new Date().toDateString();
  if (user.usageDate !== today) {
    user.usage = { lite: 0, sonnet: 0, opus: 0 };
    user.usageDate = today;
    const users = storage.get('kitty_users') || {};
    users[user.username] = user;
    storage.set('kitty_users', users);
    storage.set('kitty_session', user.username);
  }
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isTyping) return;
  if (!activeChatId) newChat();
  resetDailyIfNeeded();
  const chat = chats[activeChatId];
  const modelId = chat.modelId || 'lite';
  const model = MODELS.find(m => m.id === modelId);
  const used = user.usage[modelId] || 0;
  if (used >= model.limit) {
    alert(`Daily limit reached for ${model.label}. Switch model or wait.`);
    return;
  }
  input.value = '';
  // add user message
  const userMsg = { role: 'user', content: text, timestamp: new Date().toISOString() };
  chat.messages.push(userMsg);
  if (chat.title === 'New Chat') chat.title = text.slice(0, 30);
  chat.updatedAt = new Date().toISOString();
  saveChats();
  renderActiveChat();
  // typing indicator
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;
  const container = document.getElementById('messages');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'message assistant';
  typingDiv.innerHTML = `<div class="avatar">🐱</div><div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  container.appendChild(typingDiv);
  container.scrollTop = container.scrollHeight;
  try {
    const history = chat.messages.slice(-10).map(m => ({
      role: m.role === 'user' ? 'user' : 'assistant',
      content: m.content
    }));
    const groqKey = await getGroqKey(); // will be set via env or prompt
    if (!groqKey) throw new Error('No API key');
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${groqKey}` },
      body: JSON.stringify({
        model: model.api,
        messages: [
          { role: 'system', content: 'You are Kitty, a concise AI assistant. Give short, direct answers. For code, output only the code block. No extra explanations unless asked. Be helpful but terse.' },
          ...history
        ],
        temperature: 0.5,
        max_tokens: 800
      })
    });
    const data = await response.json();
    let aiText = data.choices?.[0]?.message?.content || '⚠️ Error: no response';
    typingDiv.remove();
    const aiMsg = { role: 'assistant', content: aiText, timestamp: new Date().toISOString() };
    chat.messages.push(aiMsg);
    user.usage[modelId]++;
    const users = storage.get('kitty_users') || {};
    users[user.username] = user;
    storage.set('kitty_users', users);
    saveChats();
    renderActiveChat();
    renderChatList();
    updateUsageDisplay();
    renderModelSelector();
  } catch (err) {
    typingDiv.remove();
    const errMsg = { role: 'assistant', content: `⚠️ ${err.message}`, timestamp: new Date().toISOString() };
    chat.messages.push(errMsg);
    saveChats();
    renderActiveChat();
  } finally {
    isTyping = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('userInput').focus();
  }
}

// retrieve API key from Vercel env or local fallback (not hardcoded)
// For production, this should call your /api/chat proxy. We'll add a fallback to prompt.
let cachedKey = null;
async function getGroqKey() {
  if (cachedKey) return cachedKey;
  // Try to fetch from Vercel proxy or local endpoint
  try {
    const res = await fetch('/api/getkey'); // optional, but we can just use /api/chat directly
    // Actually easier: we will modify the fetch to use /api/chat proxy.
    // But for simplicity, I'll embed a prompt for development
  } catch(e) {}
  // fallback: ask user
  const key = prompt('Enter your Groq API key (starts with gsk_)', localStorage.getItem('groq_key'));
  if (key && key.startsWith('gsk_')) {
    localStorage.setItem('groq_key', key);
    cachedKey = key;
    return key;
  }
  return null;
}
