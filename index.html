<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Kitty.Ai – clean, fast, helpful</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0c;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      color: #ededef;
      height: 100vh;
      overflow: hidden;
    }

    /* main container */
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(10,10,12,0.9);
      backdrop-filter: blur(10px);
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #e8192c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .model-tag {
      background: #1e1e24;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      color: #a0a0b0;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* layout: sidebar + chat */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* conversations sidebar */
    .sidebar {
      width: 280px;
      background: #0f0f12;
      border-right: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease;
      z-index: 20;
    }
    @media (max-width: 700px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        transform: translateX(-100%);
        width: 280px;
        box-shadow: 4px 0 20px rgba(0,0,0,0.5);
        z-index: 30;
      }
      .sidebar.open {
        transform: translateX(0);
      }
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .new-chat-btn {
      width: 100%;
      background: #e8192c;
      border: none;
      color: white;
      font-weight: 600;
      padding: 10px;
      border-radius: 12px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.15s;
    }
    .new-chat-btn:hover {
      background: #ff2f42;
    }
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-item {
      background: #141417;
      border: 1px solid #1f1f26;
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      transition: 0.1s;
    }
    .chat-item.active {
      background: #1c1c24;
      border-color: #e8192c;
    }
    .chat-title {
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-preview {
      font-size: 0.7rem;
      color: #8e8e9e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .chat-actions button {
      background: transparent;
      border: none;
      color: #6e6e7e;
      font-size: 0.7rem;
      cursor: pointer;
    }

    /* main chat area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0a0a0c;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
    }
    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .avatar {
      width: 34px;
      height: 34px;
      background: #202024;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .message.user .avatar {
      background: #e8192c;
    }
    .bubble {
      background: #151518;
      border: 1px solid #26262e;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .message.user .bubble {
      background: rgba(232,25,44,0.12);
      border-color: rgba(232,25,44,0.3);
    }
    .time {
      font-size: 0.6rem;
      color: #6e6e7e;
      margin-top: 4px;
      text-align: right;
    }
    pre {
      background: #0b0b0e;
      padding: 12px;
      border-radius: 12px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 0.75rem;
      font-family: 'SF Mono', monospace;
    }
    code {
      font-family: monospace;
      font-size: 0.75rem;
    }

    /* input area */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(10,10,12,0.9);
      backdrop-filter: blur(8px);
    }
    .model-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .model-pill {
      background: #141417;
      border: 1px solid #26262e;
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      color: #b0b0c0;
      transition: 0.1s;
    }
    .model-pill.active {
      background: #e8192c;
      border-color: #e8192c;
      color: white;
    }
    .model-pill.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      background: #141417;
      border: 1px solid #26262e;
      border-radius: 28px;
      padding: 12px 18px;
      font-size: 0.9rem;
      color: white;
      resize: none;
      font-family: inherit;
      outline: none;
      max-height: 120px;
    }
    .send-btn {
      background: #e8192c;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      font-size: 1.2rem;
    }
    .usage {
      font-size: 0.65rem;
      color: #6e6e7e;
      margin-top: 8px;
      text-align: right;
    }
    .warning {
      background: rgba(232,25,44,0.1);
      border: 1px solid rgba(232,25,44,0.3);
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 0.7rem;
      color: #ff6b7a;
      margin-bottom: 10px;
      display: none;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #8e8e9e;
    }
    .suggestions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }
    .suggestion {
      background: #141417;
      border: 1px solid #26262e;
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .menu-btn {
      display: none;
      background: #1e1e24;
      border: 1px solid #2a2a32;
      border-radius: 10px;
      padding: 8px;
      cursor: pointer;
      margin-right: 12px;
    }
    @media (max-width: 700px) {
      .menu-btn {
        display: block;
      }
      .message {
        max-width: 95%;
      }
    }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 25;
    }
    .overlay.show {
      display: block;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div style="display: flex; align-items: center; gap: 8px;">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div class="logo">Kitty.Ai</div>
    </div>
    <div class="model-tag" id="modelTag">⚡ Lite</div>
  </div>

  <div class="layout">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
      </div>
      <div class="chat-list" id="chatList"></div>
    </div>
    <div class="overlay" id="overlay"></div>
    <div class="main">
      <div class="messages" id="messages">
        <div class="empty-state">
          🐱<br>
          <strong>Kitty.Ai</strong><br>
          Ask me anything – code, debug, explain.<br>
          <div class="suggestions">
            <div class="suggestion" data-prompt="Write a Python function to reverse a linked list">Reverse linked list</div>
            <div class="suggestion" data-prompt="Explain async/await in JavaScript with an example">Async/await JS</div>
            <div class="suggestion" data-prompt="Simple React counter component">React counter</div>
          </div>
        </div>
      </div>
      <div class="input-area">
        <div class="warning" id="warningMsg">⚠️ Daily limit reached for this model</div>
        <div class="model-row" id="modelRow"></div>
        <div class="input-wrapper">
          <textarea id="userInput" rows="1" placeholder="Type your message... (Shift+Enter for new line)"></textarea>
          <button class="send-btn" id="sendBtn">➤</button>
        </div>
        <div class="usage" id="usage"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // ----------------------------------------------
  //  Kitty.Ai – working models, clean UI, no nonsense
  // ----------------------------------------------
  const MODELS = [
    { id: 'lite', label: 'Lite', api: 'llama-3.3-70b-versatile', limit: 100, color: '#22c55e' },
    { id: 'pro', label: 'Pro', api: 'llama-3.3-70b-versatile', limit: 50, color: '#3b82f6' },
    { id: 'max', label: 'Max', api: 'mixtral-8x7b-32768', limit: 30, color: '#a855f7' }
  ];

  let currentUser = null;
  let chats = {};
  let activeChatId = null;
  let isTyping = false;
  let currentModel = MODELS[0];

  // --- storage helpers ---
  const store = {
    get: (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
    set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
    del: (k) => localStorage.removeItem(k)
  };

  // --- simple auth (guest auto-login) ---
  async function hashPassword(pwd) {
    const enc = new TextEncoder().encode('kitty_salt:' + pwd);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function initGuest() {
    let users = store.get('kitty_users') || {};
    if (!users.admin) {
      const adminHash = await hashPassword('admin123');
      users.admin = {
        username: 'admin', name: 'Admin', email: 'admin@kitty.ai',
        password: adminHash, role: 'admin', banned: false,
        usage: { lite: 0, pro: 0, max: 0 },
        usageDate: new Date().toDateString()
      };
    }
    let sess = store.get('kitty_session');
    if (sess && users[sess]) {
      currentUser = users[sess];
    } else {
      const guestName = 'guest_' + Date.now();
      const guestHash = await hashPassword('guestpass');
      const guest = {
        username: guestName, name: 'Guest', email: guestName + '@temp.com',
        password: guestHash, role: 'user', banned: false,
        usage: { lite: 0, pro: 0, max: 0 },
        usageDate: new Date().toDateString()
      };
      users[guestName] = guest;
      store.set('kitty_users', users);
      store.set('kitty_session', guestName);
      currentUser = guest;
    }
  }

  // --- chat persistence ---
  function loadChats() {
    const saved = store.get('kitty_chats_' + currentUser.username) || {};
    chats = saved;
  }
  function saveChats() {
    store.set('kitty_chats_' + currentUser.username, chats);
  }

  function newChat() {
    const id = 'c_' + Date.now();
    chats[id] = {
      id, title: 'New Chat', messages: [], modelId: currentModel.id,
      createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
    };
    activeChatId = id;
    saveChats();
    renderChatList();
    renderActiveChat();
    document.getElementById('userInput').value = '';
    updateUsageDisplay();
  }

  function selectChat(id) {
    activeChatId = id;
    renderChatList();
    renderActiveChat();
    updateUsageDisplay();
  }

  function deleteChat(id) {
    if (confirm('Delete this chat?')) {
      delete chats[id];
      if (activeChatId === id) activeChatId = Object.keys(chats)[0] || null;
      saveChats();
      renderChatList();
      renderActiveChat();
    }
  }

  function renameChat(id) {
    const newName = prompt('Rename chat', chats[id].title);
    if (newName && newName.trim()) chats[id].title = newName.trim().slice(0, 40);
    saveChats();
    renderChatList();
    if (activeChatId === id) renderActiveChat();
  }

  function renderChatList() {
    const container = document.getElementById('chatList');
    const sorted = Object.values(chats).sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));
    container.innerHTML = sorted.map(c => `
      <div class="chat-item ${c.id === activeChatId ? 'active' : ''}" onclick="selectChat('${c.id}')">
        <div class="chat-title">${escapeHtml(c.title)}</div>
        <div class="chat-preview">${c.messages.length ? c.messages[c.messages.length-1]?.content?.substring(0,40) || '...' : 'empty'}</div>
        <div class="chat-actions">
          <button onclick="event.stopPropagation(); renameChat('${c.id}')">✏️</button>
          <button onclick="event.stopPropagation(); deleteChat('${c.id}')">🗑️</button>
        </div>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function formatMessage(text) {
    if (!text) return '';
    let t = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
    t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
    t = t.replace(/\n/g, '<br>');
    return t;
  }

  function renderActiveChat() {
    const container = document.getElementById('messages');
    if (!activeChatId || !chats[activeChatId]) {
      container.innerHTML = `<div class="empty-state">🐱<br>Select or start a chat</div>`;
      return;
    }
    const chat = chats[activeChatId];
    if (!chat.messages.length) {
      container.innerHTML = `
        <div class="empty-state">
          🐱<br>
          <strong>Kitty.Ai</strong><br>
          Ask me anything – code, debug, explain.<br>
          <div class="suggestions">
            <div class="suggestion" data-prompt="Write a Python function to reverse a linked list">Reverse linked list</div>
            <div class="suggestion" data-prompt="Explain async/await in JavaScript with an example">Async/await JS</div>
            <div class="suggestion" data-prompt="Simple React counter component">React counter</div>
          </div>
        </div>
      `;
      document.querySelectorAll('.suggestion').forEach(el => {
        el.onclick = () => {
          document.getElementById('userInput').value = el.dataset.prompt;
          sendMessage();
        };
      });
      return;
    }
    container.innerHTML = chat.messages.map(msg => `
      <div class="message ${msg.role}">
        <div class="avatar">${msg.role === 'user' ? '👤' : '🐱'}</div>
        <div><div class="bubble">${formatMessage(msg.content)}</div><div class="time">${new Date(msg.timestamp).toLocaleTimeString()}</div></div>
      </div>
    `).join('');
    container.scrollTop = container.scrollHeight;
  }

  // --- daily usage reset ---
  function resetDailyIfNeeded() {
    const today = new Date().toDateString();
    if (currentUser.usageDate !== today) {
      currentUser.usage = { lite: 0, pro: 0, max: 0 };
      currentUser.usageDate = today;
      const users = store.get('kitty_users') || {};
      users[currentUser.username] = currentUser;
      store.set('kitty_users', users);
      store.set('kitty_session', currentUser.username);
    }
  }

  function updateUsageDisplay() {
    const chat = chats[activeChatId];
    const modelId = chat ? chat.modelId : currentModel.id;
    const model = MODELS.find(m => m.id === modelId);
    const used = currentUser.usage[modelId] || 0;
    const left = model.limit - used;
    document.getElementById('usage').innerHTML = `${model.label} · ${left} left today`;
    document.getElementById('modelTag').innerHTML = model.label === 'Lite' ? '⚡ Lite' : (model.label === 'Pro' ? '🔥 Pro' : '💎 Max');
    const warn = document.getElementById('warningMsg');
    warn.style.display = left <= 0 ? 'block' : 'none';
  }

  function renderModelSelector() {
    const container = document.getElementById('modelRow');
    const chat = chats[activeChatId];
    const activeModelId = chat ? chat.modelId : currentModel.id;
    container.innerHTML = MODELS.map(m => {
      const used = currentUser.usage[m.id] || 0;
      const exhausted = used >= m.limit;
      return `<button class="model-pill ${activeModelId === m.id ? 'active' : ''} ${exhausted ? 'disabled' : ''}" data-model="${m.id}">${m.label} (${used}/${m.limit})</button>`;
    }).join('');
    document.querySelectorAll('.model-pill').forEach(btn => {
      btn.onclick = () => {
        const modelId = btn.dataset.model;
        const model = MODELS.find(m => m.id === modelId);
        if (currentUser.usage[modelId] >= model.limit) {
          alert(`Daily limit reached for ${model.label}.`);
          return;
        }
        if (activeChatId && chats[activeChatId]) {
          chats[activeChatId].modelId = modelId;
          saveChats();
        }
        currentModel = model;
        renderModelSelector();
        updateUsageDisplay();
      };
    });
  }

  // --- API call through Vercel proxy (or direct for local testing) ---
  let GROQ_API_KEY = null;
  async function getGroqKey() {
    if (GROQ_API_KEY) return GROQ_API_KEY;
    // try to fetch from local /api/chat (vercel) or ask user once
    // For local development, prompt once
    const stored = localStorage.getItem('groq_key');
    if (stored && stored.startsWith('gsk_')) {
      GROQ_API_KEY = stored;
      return GROQ_API_KEY;
    }
    const key = prompt('Enter your Groq API key (starts with gsk_):');
    if (key && key.startsWith('gsk_')) {
      localStorage.setItem('groq_key', key);
      GROQ_API_KEY = key;
      return key;
    }
    return null;
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text || isTyping) return;
    if (!activeChatId) newChat();

    resetDailyIfNeeded();
    const chat = chats[activeChatId];
    const modelId = chat.modelId || currentModel.id;
    const model = MODELS.find(m => m.id === modelId);
    const used = currentUser.usage[modelId] || 0;
    if (used >= model.limit) {
      alert(`Daily limit for ${model.label} reached. Switch model or wait.`);
      return;
    }

    input.value = '';
    const userMsg = { role: 'user', content: text, timestamp: new Date().toISOString() };
    chat.messages.push(userMsg);
    if (chat.title === 'New Chat') chat.title = text.slice(0, 30);
    chat.updatedAt = new Date().toISOString();
    saveChats();
    renderActiveChat();
    renderChatList();

    isTyping = true;
    document.getElementById('sendBtn').disabled = true;
    const container = document.getElementById('messages');
    const typingDiv = document.createElement('div');
    typingDiv.className = 'message assistant';
    typingDiv.innerHTML = `<div class="avatar">🐱</div><div><div class="bubble"><div style="display:flex; gap:4px; padding:4px;"><span style="width:6px;height:6px;background:#888;border-radius:50%;animation:pulse 1.2s infinite;"></span><span style="width:6px;height:6px;background:#888;border-radius:50%;animation:pulse 1.2s infinite 0.2s;"></span><span style="width:6px;height:6px;background:#888;border-radius:50%;animation:pulse 1.2s infinite 0.4s;"></span></div></div></div>`;
    container.appendChild(typingDiv);
    container.scrollTop = container.scrollHeight;

    try {
      const groqKey = await getGroqKey();
      if (!groqKey) throw new Error('No API key provided');

      const history = chat.messages.slice(-10).map(m => ({
        role: m.role === 'user' ? 'user' : 'assistant',
        content: m.content
      }));

      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${groqKey}`
        },
        body: JSON.stringify({
          model: model.api,
          messages: [
            { role: 'system', content: 'You are Kitty, a terse, helpful AI. Answer concisely, with only the necessary code or explanation. No fluff.' },
            ...history
          ],
          temperature: 0.5,
          max_tokens: 800
        })
      });

      const data = await response.json();
      let aiText = data.choices?.[0]?.message?.content || '⚠️ No response';
      typingDiv.remove();
      const aiMsg = { role: 'assistant', content: aiText, timestamp: new Date().toISOString() };
      chat.messages.push(aiMsg);
      currentUser.usage[modelId]++;
      const users = store.get('kitty_users') || {};
      users[currentUser.username] = currentUser;
      store.set('kitty_users', users);
      saveChats();
      renderActiveChat();
      renderChatList();
      updateUsageDisplay();
      renderModelSelector();
    } catch (err) {
      typingDiv.remove();
      const errMsg = { role: 'assistant', content: `⚠️ ${err.message}`, timestamp: new Date().toISOString() };
      chat.messages.push(errMsg);
      saveChats();
      renderActiveChat();
    } finally {
      isTyping = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('userInput').focus();
    }
  }

  // --- init ---
  window.onload = async () => {
    await initGuest();
    loadChats();
    if (Object.keys(chats).length === 0) newChat();
    else {
      activeChatId = Object.keys(chats)[0];
      renderChatList();
      renderActiveChat();
      updateUsageDisplay();
    }
    renderModelSelector();
    updateUsageDisplay();

    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('newChatBtn').onclick = () => newChat();
    document.getElementById('menuBtn').onclick = () => {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('overlay').classList.add('show');
    };
    document.getElementById('overlay').onclick = () => {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    };
    document.getElementById('userInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  };
</script>
</body>
</html>
