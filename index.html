<script>
// FINAL WORKING VERSION - AUTO DISCOVER MODEL
const API_KEYS = [
  'AIzaSyCVJAigJ54cqgzPqI-uebdhZBj_c8QAFdQ',
  'AIzaSyBj4lbg73KVYMIAHketCOatQXWwbOlJFiU'
];
let keyIdx = 0;
const getKey = () => { const k = API_KEYS[keyIdx]; keyIdx = (keyIdx + 1) % API_KEYS.length; return k; };

let WORKING_MODEL = null;

// Function to fetch and set a working model
async function discoverWorkingModel() {
  const possibleModels = [
    'gemini-1.5-flash',
    'gemini-1.5-pro',
    'gemini-1.0-pro',
    'gemini-pro',
    'models/gemini-1.5-flash',
    'models/gemini-pro'
  ];
  
  for (const key of API_KEYS) {
    for (const model of possibleModels) {
      try {
        // Test with a simple generateContent request (empty prompt just to check)
        const testUrl = `https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${key}`;
        const response = await fetch(testUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: "Hello" }] }], generationConfig: { maxOutputTokens: 1 } })
        });
        if (response.ok) {
          WORKING_MODEL = model;
          console.log('✅ Working model found:', WORKING_MODEL);
          return;
        } else {
          const err = await response.json();
          console.warn(`Model ${model} failed:`, err.error?.message);
        }
      } catch(e) { console.warn(`Model ${model} error:`, e.message); }
    }
  }
  // Fallback - try any model from the list endpoint
  try {
    const listUrl = `https://generativelanguage.googleapis.com/v1/models?key=${API_KEYS[0]}`;
    const res = await fetch(listUrl);
    const data = await res.json();
    if (data.models && data.models.length) {
      const candidate = data.models.find(m => m.supportedGenerationMethods?.includes('generateContent'));
      if (candidate) {
        WORKING_MODEL = candidate.name.replace('models/', '');
        console.log('✅ Discovered working model from list:', WORKING_MODEL);
        return;
      }
    }
  } catch(e) { console.warn('List models failed', e); }
  
  // Ultimate fallback
  WORKING_MODEL = 'gemini-1.5-flash';
  console.warn('⚠️ Using fallback model:', WORKING_MODEL);
}

// Models config
const MODELS_CONFIG = {
  'gemini-lite': { label: '3.1 lite', limit: 100, color: '#22c55e' },
  'gemini-35':   { label: '3.5',       limit: 50,  color: '#3b82f6' },
  'gemini-pro':  { label: '3.1 pro',   limit: 30,  color: '#a855f7' }
};

let selectedModelId = 'gemini-lite';
let currentUser = null;
let chats = {};
let activeChatId = null;
let isAITyping = false;
let currentPage = 'loading';
let currentDashTab = 'home';
let sidebarCollapsed = false;

const S = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)) } catch { return null } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
  del: k => localStorage.removeItem(k)
};

async function hashPassword(plain) {
  const enc = new TextEncoder().encode('kittyai_salt_v1:' + plain);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function verifyPassword(plain, stored) { return (await hashPassword(plain)) === stored; }

function initAdminUser() {
  const users = S.get('kitty_users') || {};
  if (!users['admin']) {
    hashPassword('admin123').then(hashed => {
      const u = S.get('kitty_users') || {};
      if (!u['admin']) {
        u['admin'] = {
          username: 'admin', name: 'Administrator', email: 'admin@kittyai.com',
          password: hashed, role: 'admin', banned: false,
          createdAt: new Date().toISOString(), lastLogin: null,
          usage: { 'gemini-lite': 0, 'gemini-35': 0, 'gemini-pro': 0 },
          usageDate: new Date().toDateString(), totalRequests: 0
        };
        S.set('kitty_users', u);
      }
    });
  }
}

window.addEventListener('load', async () => {
  initAdminUser();
  await discoverWorkingModel();
  setTimeout(() => {
    const loadingScreen = document.getElementById('loading-screen');
    if (loadingScreen) {
      loadingScreen.style.opacity = '0';
      setTimeout(() => { loadingScreen.style.display = 'none'; }, 500);
    }
    const sess = S.get('kitty_session');
    if (sess) {
      const users = S.get('kitty_users') || {};
      if (users[sess]) { currentUser = users[sess]; showPage('dashboard'); }
      else showPage('landing');
    } else showPage('landing');
  }, 1500);
  initCmdPalette();
  startResetTimer();
});

// The key change: sendMessage uses WORKING_MODEL
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isAITyping) return;
  if (!activeChatId) newChat();
  refreshUserData(); resetDailyIfNeeded();
  const mConf = MODELS_CONFIG[selectedModelId];
  const used = currentUser.usage[selectedModelId] || 0;
  if (used >= mConf.limit) {
    notify(`Daily limit for ${mConf.label} reached`, 'error');
    document.getElementById('limit-warning').classList.add('show');
    return;
  }
  input.value = ''; autoResize(input);
  const chat = chats[activeChatId];
  const userMsg = { role: 'user', content: text, timestamp: new Date().toISOString() };
  chat.messages.push(userMsg);
  if (chat.title === 'New Chat') chat.title = text.length > 35 ? text.substring(0,35)+'...' : text;
  chat.updatedAt = new Date().toISOString();
  saveChats(); renderChatSidebar();
  const msgs = document.getElementById('messages');
  const empty = msgs.querySelector('.chat-empty'); if (empty) empty.remove();
  msgs.appendChild(createMsgEl(userMsg, chat.messages.length-1));
  isAITyping = true;
  document.getElementById('chat-send-btn').disabled = true;
  const typingEl = document.createElement('div');
  typingEl.className = 'msg ai';
  typingEl.innerHTML = `<div class="msg-avatar">🐱</div><div class="msg-bubble"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  msgs.appendChild(typingEl);
  msgs.scrollTop = msgs.scrollHeight;
  try {
    const history = chat.messages.slice(-10).map(msg => ({
      role: msg.role === 'user' ? 'user' : 'model',
      parts: [{ text: msg.content }]
    }));
    let resp, data, lastErr;
    for (let attempt = 0; attempt < API_KEYS.length; attempt++) {
      try {
        // Use the discovered working model
        const url = `https://generativelanguage.googleapis.com/v1/models/${WORKING_MODEL}:generateContent?key=${getKey()}`;
        resp = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: history,
            generationConfig: { temperature: 0.9, maxOutputTokens: 1024 }
          })
        });
        data = await resp.json();
        if (data.error && (data.error.code === 429 || data.error.status === 'RESOURCE_EXHAUSTED')) {
          lastErr = data.error.message;
          continue;
        }
        break;
      } catch(e) { lastErr = e.message; }
    }
    let aiText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!aiText) {
      if (data?.error) aiText = `⚠ API Error: ${data.error.message}`;
      else if (lastErr) aiText = `⚠ All keys exhausted. Last error: ${lastErr}`;
      else aiText = '⚠ No response from AI.';
    }
    typingEl.remove();
    const aiMsg = { role: 'ai', content: aiText, timestamp: new Date().toISOString(), model: selectedModelId };
    chat.messages.push(aiMsg);
    currentUser.usage[selectedModelId] = (currentUser.usage[selectedModelId] || 0) + 1;
    saveUser(); saveChats();
    msgs.appendChild(createMsgEl(aiMsg, chat.messages.length-1));
    updateUsageInfo(); renderChatSidebar();
  } catch(err) {
    typingEl.remove();
    chat.messages.push({ role: 'ai', content: `⚠ Error: ${err.message}`, timestamp: new Date().toISOString() });
    saveChats();
    msgs.appendChild(createMsgEl(chat.messages[chat.messages.length-1], chat.messages.length-1));
  }
  msgs.scrollTop = msgs.scrollHeight;
  isAITyping = false;
  document.getElementById('chat-send-btn').disabled = false;
  document.getElementById('limit-warning').classList.remove('show');
}
